<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Colors */
        :root {
            --text-main: #2d3436;
            --text-muted: #636e72;
            --card-bg: rgba(255, 255, 255, 0.92);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated Colorful Background */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container - Glassmorphism Effect */
        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* Typography */
        h1 {
            color: #d63031;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h4 {
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        h4 a {
            color: #0984e3;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        h4 a:hover {
            color: #d63031;
        }

        h2 {
            color: #000;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        /* Grid Layout for Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        /* Modern Button Styling */
        button {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
            width: 100%;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
            background: linear-gradient(135deg, #5f27cd, #341f97);
        }

        /* Unique Colors for Different Sections */
        .section-google button { background: linear-gradient(135deg, #ff7675, #d63031); box-shadow: 0 4px 10px rgba(214, 48, 49, 0.2); }
        .section-google button:hover { background: linear-gradient(135deg, #d63031, #b33939); }

        .section-share button { background: linear-gradient(135deg, #55efc4, #00b894); box-shadow: 0 4px 10px rgba(0, 184, 148, 0.2); color: #000; }
        .section-share button:hover { background: linear-gradient(135deg, #00b894, #01997b); color: white; }

        .section-bank button { background: linear-gradient(135deg, #74b9ff, #0984e3); box-shadow: 0 4px 10px rgba(9, 132, 227, 0.2); }
        .section-bank button:hover { background: linear-gradient(135deg, #0984e3, #0652dd); }

        .section-ai button { background: linear-gradient(135deg, #fd79a8, #e84393); box-shadow: 0 4px 10px rgba(232, 67, 147, 0.2); }
        .section-ai button:hover { background: linear-gradient(135deg, #e84393, #b71540); }

        .section-code button { background: linear-gradient(135deg, #636e72, #2d3436); box-shadow: 0 4px 10px rgba(45, 52, 54, 0.2); }
        .section-code button:hover { background: linear-gradient(135deg, #2d3436, #000000); }

        .section-video button { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); box-shadow: 0 4px 10px rgba(253, 203, 110, 0.2); color: #000; }
        .section-video button:hover { background: linear-gradient(135deg, #fdcb6e, #e1b12c); }

        .section-a2z button { background: linear-gradient(135deg, #00cec9, #00b894); box-shadow: 0 4px 10px rgba(0, 206, 201, 0.2); }
        .section-a2z button:hover { background: linear-gradient(135deg, #00b894, #01997b); }

        /* Footer */
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .btn-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            }
        }
    </style>
</head>
